<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Landing Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS Manual -->
  <style>
    .hero {
      height: 70vh;

      /* Background gambar */
      background-image: linear-gradient(
          rgba(0, 0, 0, 0.5),
          rgba(0, 0, 0, 0.5)
        ),
        url('https://image.idn.media/post/20250603/magen-43da29a867d49c1f351ac6b665d26419-0574d2e9e9da0236f17e20c27bb08b76.jpg');

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      color: white;
    }

    .section-game {
      padding: 60px 0;
      text-align: center;
      background-color: #f8f9fa;
    }

    .game-img {
      max-width: 250px;
      margin-bottom: 20px;
    }

    .contact-section {
      padding: 60px 0;
      background: #ffffff;
    }

    footer {
      background: #212529;
      color: white;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">MyWebsite</a>

    <div>
      <a href="index.html" class="btn btn-outline-light btn-sm">
        Home
      </a>

      <a href="profile.html" class="btn btn-outline-light btn-sm">
        Profile
      </a>
    </div>
  </div>
</nav>

<!-- Hero -->
<div class="hero d-flex align-items-center text-center">
  <div class="container">

    <h1 class="display-5 fw-bold">
      Welcome to Bikini Bottom
    </h1>

    <p class="lead">
      Okay, let's meet SpongeBob together
    </p>

    <a href="profile.html" class="btn btn-light btn-lg">
      Lihat Profile
    </a>

  </div>
</div>

<!-- Section Game -->
<section class="section-game">
  <div class="container">

    <img 
      src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS2enxJdM14gFMens8tqsit36-5F1BSr_XvNw&s"
      class="img-fluid game-img"
      alt="Spongebob"
    >

    <h2 class="mb-4">
      Hello Everyone, I'm Spongebob, I will introduce my friends in Bikini Bottom
    </h2>

    <p class="mb-4">
      Ready GO!!!
    </p>

    <a href="profile.html" class="btn btn-primary btn-lg">
      Get Started
    </a>

  </div>
</section>

<!-- Contact Section -->
<section class="contact-section" id="contact">
  <div class="container">

    <h2 class="text-center mb-5">
      Contact Us
    </h2>

    <div class="row justify-content-center">
      <div class="col-md-6">

        <form>

          <div class="mb-3">
            <label class="form-label">
              Name
            </label>

            <input 
              type="text"
              class="form-control"
              placeholder="Enter your name"
            >
          </div>

          <div class="mb-3">
            <label class="form-label">
              Email
            </label>

            <input 
              type="email"
              class="form-control"
              placeholder="Enter your email"
            >
          </div>

          <div class="mb-3">
            <label class="form-label">
              Message
            </label>

            <textarea 
              class="form-control"
              rows="4"
              placeholder="Write your message">
            </textarea>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Send Message
          </button>

        </form>

      </div>
    </div>

  </div>
</section>

<!-- Footer -->
<footer>
  <div class="container">
    <p class="mb-0">
      © 2026 MyWebsite | Welcome to Bikini Bottom 🌊
    </p>
  </div>
</footer>

</body>
</html>
