</head>

<body>

<nav class="navbar navbar-dark bg-dark">

</nav>

<div class="container mt-5">
  <h2>Contact Me</h2>

  <form>
    <div class="mb-3">
      <label class="form-label">Nama</label>

    </div>

      <input type="email" class="form-control">

      <label class="form-label">Pesan</label>

  </form>
